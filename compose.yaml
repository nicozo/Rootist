services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 開発環境
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  dev:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development # 開発ステージを指定
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules # コンテナ内のnode_modulesをホストと共有しない
      - /app/.pnpm-store # pnpmのストアをホストと共有しない
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://myuser:mypassword@mysql:3306/rootist
    stdin_open: true
    tty: true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 本番環境
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  prod:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile
      target: production # 本番ステージを指定
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:rootpassword@mysql:3306/rootist
      # 本番環境用の環境変数
      - ORIGIN=https://yourdomain.com
      - BODY_SIZE_LIMIT=10485760
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    # ヘルスチェック
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # MySQL
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  mysql:
    image: mysql:8.0
    restart: always
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      # パフォーマンス設定
      - MYSQL_INNODB_BUFFER_POOL_SIZE=256M
    volumes:
      - mysql-data:/var/lib/mysql
      # 初期化SQLがある場合
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # - --general-log=1 # SQLログを有効化
      # - --general-log-file=/var/lib/mysql/general.log # ログの出力先
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - app-network

volumes:
  pnpm_store:
  node_modules:
  mysql-data:

networks:
  app-network:
    driver: bridge

